runtime: plugin
action:
  title: Add
  description: Add a zone path
  arguments:
    - name: zone
      title: Zone
      description: Zone path to add (e.g., platform.layer.sublayer)
      required: true
  options:
    - name: dir
      shorthand: d
      title: Directory
      description: Working directory (defaults to current)
      type: string
      default: "."
    - name: force
      shorthand: f
      title: Force
      description: Skip error if zone path already exists
      type: boolean
      default: false
  result:
    type: object
    properties:
      zone:
        type: string
        description: The zone path that was added
