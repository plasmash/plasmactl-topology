runtime: plugin
action:
  title: Rename
  description: Rename a zone path segment and update all allocations and attachments. Both paths must have the same depth (number of segments).
  arguments:
    - name: old
      title: Old Path
      description: Current zone path
      required: true
    - name: new
      title: New Path
      description: New zone path
      required: true
  options:
    - name: dir
      shorthand: d
      title: Directory
      description: Working directory (defaults to current)
      type: string
      default: "."
    - name: dry-run
      title: Dry Run
      description: Show what would change without modifying files
      type: boolean
      default: false
  result:
    type: object
    properties:
      old:
        type: string
        description: Previous zone path
      new:
        type: string
        description: New zone path
      updated_attachments:
        type: array
        description: Playbook files updated with new zone path
        items:
          type: string
      updated_allocations:
        type: array
        description: Allocation files updated with new zone path
        items:
          type: string
